name: Update Eval Baseline

# Manually refresh eval/baseline_scores.json after an intentional, reviewed
# improvement. Runs the same harness as the gate, then commits the new scores.

on:
  workflow_dispatch:
    inputs:
      subset:
        description: "Entries per category to score"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: finrag
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/finrag
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Haiku for RAGAS + judge keeps a full-baseline refresh cheap (still 5 metrics).
      EVAL_LLM_MODEL: claude-haiku-4-5-20251001
      EVAL_JUDGE_MODEL: claude-haiku-4-5-20251001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r eval/requirements.txt

      - name: Write backend .env
        run: |
          cat > backend/.env <<EOF
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          ENVIRONMENT=ci
          CORS_ORIGINS=http://localhost:3000
          EOF

      - name: Ingest a small ticker set
        working-directory: backend
        run: |
          python - <<'PY'
          import asyncio
          from app.services.ingestion import ingest_ticker
          tickers = ["AAPL", "MSFT", "NVDA", "AMZN", "GOOGL", "TSLA", "META", "JPM", "KO", "XOM"]
          async def main():
              for t in tickers:
                  n = await ingest_ticker(t, "3mo")
                  print(f"ingested {t}: {n} docs")
          asyncio.run(main())
          PY

      - name: Recompute baseline
        working-directory: eval
        run: python ci_eval.py --subset ${{ github.event.inputs.subset }} --update-baseline

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eval/baseline_scores.json
          if git diff --staged --quiet; then
            echo "Baseline unchanged."
          else
            git commit -m "chore(eval): refresh baseline scores"
            git push
          fi
