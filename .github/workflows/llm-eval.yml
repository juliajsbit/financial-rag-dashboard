name: LLM Eval Gate

# Runs the prompt-regression gate on PRs that touch the prompt or RAG logic.
# Spins up Postgres (pgvector) + Redis, ingests a small ticker set, runs a
# golden subset through the LLM judge, and fails if the judge score regresses
# beyond the thresholds in eval/ci_eval.py. Posts the score diff as a PR comment.
#
# Cost: RAGAS is intentionally skipped here (--no-ragas) - it is very call-heavy.
# The gate is judge-only on a small subset with Haiku, so a run costs cents.
# For the full RAGAS picture, run the harness locally or use update-baseline.

on:
  pull_request:
    paths:
      - "backend/app/services/rag.py"
      - "prompts/**"
      - "eval/**"
      - ".github/workflows/llm-eval.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: finrag
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/finrag
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Keep CI cost in cents: judge-only (no RAGAS) on a small subset with Haiku.
      EVAL_JUDGE_MODEL: claude-haiku-4-5-20251001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Judge-only gate: backend deps are enough (no RAGAS / datasets install).
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Write backend .env
        run: |
          cat > backend/.env <<EOF
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          ENVIRONMENT=ci
          CORS_ORIGINS=http://localhost:3000
          EOF

      - name: Ingest a small ticker set
        working-directory: backend
        run: |
          python - <<'PY'
          import asyncio
          from app.services.ingestion import ingest_ticker
          tickers = ["AAPL", "MSFT", "NVDA", "AMZN", "GOOGL", "TSLA", "META", "JPM", "KO", "XOM"]
          async def main():
              for t in tickers:
                  n = await ingest_ticker(t, "3mo")
                  print(f"ingested {t}: {n} docs")
          asyncio.run(main())
          PY

      - name: Run eval gate
        id: gate
        continue-on-error: true
        working-directory: eval
        run: |
          python ci_eval.py --subset 2 --no-ragas --comment-out ci_comment.md

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'eval/ci_comment.md';
            const body = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8')
              : '⚠️ Eval gate did not produce a report (it likely errored before scoring).';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce gate
        if: steps.gate.outcome == 'failure'
        run: |
          echo "Eval gate reported a regression."
          exit 1
